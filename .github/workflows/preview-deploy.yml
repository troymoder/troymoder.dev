name: Preview

on:
  workflow_call:
    outputs:
      preview-url:
        description: "The deployed preview URL"
        value: ${{ jobs.deploy.outputs.preview-url }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: surge-preview
      url: ${{ steps.deploy.outputs.preview-url }}
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build

      - name: Extract artifact
        run: |
          set -eo pipefail
          tar -xzf website.tar.gz

      - name: Install Surge
        run: npm install --global surge

      - name: Deploy to Surge
        id: deploy
        run: |
          surge ./dist --preview --domain ${{ vars.SURGE_DOMAIN }} --token ${{ secrets.SURGE_TOKEN }} | tee output.txt
          PREVIEW_URL=$(grep -oE 'https://[^ ]+\.surge\.sh' output.txt)
          echo "preview-url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - uses: marocchino/sticky-pull-request-comment@v3
        name: Sticky pull request comment
        with:
          message: |
            Release ${{ github.sha }} to <${{ steps.deploy.outputs.preview-url }}>
