name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    permissions: &read-permissions
      contents: read
    defaults: &defaults
      run:
        shell: ${{ github.workspace }}/.github/scripts/nix-shell.sh bash -e {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - &setup-nix
        name: Setup environment
        uses: troymoder/shared-actions/setup-nix@b114355b5a126b78c9e19920afa01075a32ee39e
        with:
          nix_cache_private_key: ${{ secrets.NIX_CACHE_PRIVATE_KEY }}
          nix_cache_public_key: ${{ vars.NIX_CACHE_PUBLIC_KEY }}
          s3_bucket: ${{ vars.S3_CACHE_BUCKET }}
          s3_endpoint: ${{ vars.S3_CACHE_ENDPOINT }}
          s3_public_url: ${{ vars.S3_CACHE_PUBLIC_URL }}
          s3_access_key: ${{ secrets.S3_CACHE_BUCKET_ACCESS_KEY || vars.S3_CACHE_BUCKET_PUBLIC_ACCESS_KEY }}
          s3_secret_access_key: ${{ secrets.S3_CACHE_BUCKET_SECRET_ACCESS_KEY || vars.S3_CACHE_BUCKET_PUBLIC_SECRET_ACCESS_KEY }}

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: just fmt

      - name: Check for changes
        run: git diff --exit-code

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults: *defaults
    permissions: *read-permissions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - *setup-nix

      - name: Install dependencies
        run: pnpm install

      - name: Check linting
        run: just lint

  build:
    name: Build
    uses: ./.github/workflows/build.yml
    permissions: *read-permissions
    secrets: inherit

  preview:
    if: ${{ github.event_name == 'pull_request' }}
    name: Preview
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: surge-preview
      url: ${{ steps.deploy.outputs.preview-url }}
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build

      - name: Extract artifact
        run: |
          set -eo pipefail
          tar -xzf website.tar.gz

      - name: Install Surge
        run: npm install --global surge

      - name: Deploy to Surge
        id: deploy
        run: |
          surge ./dist --preview --domain ${{ vars.SURGE_DOMAIN }} --token ${{ secrets.SURGE_TOKEN }} | tee output.txt
          PREVIEW_DOMAIN=$(grep "Live preview" output.txt | grep -oE '[0-9]+-[^[:space:]]+\.surge\.sh')
          echo "preview-url=https://$PREVIEW_DOMAIN" >> "$GITHUB_OUTPUT"

      - uses: marocchino/sticky-pull-request-comment@v3
        name: Sticky pull request comment
        with:
          message: |
            Release ${{ github.sha }} to <${{ steps.deploy.outputs.preview-url }}>

  status:
    name: Status
    runs-on: ubuntu-latest
    permissions: *read-permissions
    needs: [fmt, lint, build]
    if: ${{ !cancelled() }}
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
